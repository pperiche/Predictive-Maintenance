name: Predictive Maintenance

on:
  push:
    branches: [ main ]

jobs:

  register-dataset:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v3

      # Step 2: DEBUG (mandatory verification)
      - name: Debug Check
        run: |
          echo "Current directory:"
          pwd
          echo "Listing all files:"
          ls -R

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: pip install -r predictive-maintenance/requirements.txt

      # Step 4: Upload dataset
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DATASET_REPO: PratzPrathibha/predictive-maintenance-data
        run: python predictive-maintenance/model_building/data_register.py


  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
           python -m pip install --upgrade pip
           pip install --retries 5 --timeout 60 -r predictive-maintenance/requirements.txt

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DATASET_REPO: PratzPrathibha/predictive-maintenance-data
        run: python predictive-maintenance/model_building/prep.py


  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r  predictive-maintenance/requirements.txt

      - name: Model Building
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DATASET_REPO: PratzPrathibha/predictive-maintenance-data
        run: python predictive-maintenance/model_building/train.py


  deploy-hosting:
    needs: [model-training, data-prep, register-dataset]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install -r predictive-maintenance/requirements.txt

      - name: Push files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_REPO: PratzPrathibha/Predictive-maintenance
        run: python predictive-maintenance/hosting/hosting.py
